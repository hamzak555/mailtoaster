name: Release Mac App

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare signing assets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.BUILD_INSTALLER_CERTIFICATE_BASE64 }}
          CSC_INSTALLER_KEY_PASSWORD: ${{ secrets.CSC_INSTALLER_KEY_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          missing_required=()

          for secret_name in \
            BUILD_CERTIFICATE_BASE64 \
            CSC_KEY_PASSWORD
          do
            if [ -z "${!secret_name}" ]; then
              missing_required+=("$secret_name")
            fi
          done

          if [ "${#missing_required[@]}" -gt 0 ]; then
            echo "::error title=Missing required release secrets::The following GitHub Actions secrets are required for signed macOS releases: ${missing_required[*]}"
            exit 1
          fi

          notarization_enabled=true

          for secret_name in APPLE_API_KEY_BASE64 APPLE_API_KEY_ID APPLE_API_ISSUER
          do
            if [ -z "${!secret_name}" ]; then
              notarization_enabled=false
            fi
          done

          CERT_PATH="$RUNNER_TEMP/mail-toaster-signing-cert.p12"

          node -e "require('node:fs').writeFileSync(process.argv[1], Buffer.from(process.env.BUILD_CERTIFICATE_BASE64, 'base64'))" "$CERT_PATH"

          echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"

          if [ -n "$BUILD_INSTALLER_CERTIFICATE_BASE64" ] && [ -n "$CSC_INSTALLER_KEY_PASSWORD" ]; then
            INSTALLER_CERT_PATH="$RUNNER_TEMP/mail-toaster-installer-cert.p12"
            node -e "require('node:fs').writeFileSync(process.argv[1], Buffer.from(process.env.BUILD_INSTALLER_CERTIFICATE_BASE64, 'base64'))" "$INSTALLER_CERT_PATH"
            echo "CSC_INSTALLER_LINK=$INSTALLER_CERT_PATH" >> "$GITHUB_ENV"
          else
            echo "::warning title=Installer signing disabled::BUILD_INSTALLER_CERTIFICATE_BASE64 and CSC_INSTALLER_KEY_PASSWORD were not both set. The PKG will build without an installer signature."
          fi

          if [ "$notarization_enabled" = true ]; then
            API_KEY_PATH="$RUNNER_TEMP/AuthKey_$APPLE_API_KEY_ID.p8"
            node -e "require('node:fs').writeFileSync(process.argv[1], Buffer.from(process.env.APPLE_API_KEY_BASE64, 'base64'))" "$API_KEY_PATH"
            echo "APPLE_API_KEY=$API_KEY_PATH" >> "$GITHUB_ENV"
          else
            echo "::warning title=Notarization disabled::APPLE_API_KEY_BASE64, APPLE_API_KEY_ID, and APPLE_API_ISSUER were not all set. The app will build, but notarization will be skipped."
          fi

      - name: Build and publish macOS release
        run: npm run release:mac
